<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Your OTP code</title>
    <style>
        .preheader { display:none !important; visibility:hidden; }
        @media screen and (max-width: 600px) {
            .container { width: 100% !important; }
            .px-24 { padding-left:16px !important; padding-right:16px !important; }
        }
    </style>
</head>
<body style="margin:0; padding:0; background:#FAFAFA; font-family:Arial,sans-serif; color:#0A0A0A;">

<div class="preheader">Your OTP code is <span th:text="${otp}"></span>. It expires in 5 minutes.</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#FAFAFA;">
    <tr>
        <td align="center" style="padding:24px 12px;">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"
                   style="background:#FFFFFF; border-radius:12px; border:1px solid #eee;">

                <!-- Header -->
                <tr>
                    <td style="padding:20px 24px 0 24px;">
                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td style="font-size:12px; color:#606060;" align="right"
                                    th:text="${sentAt}">
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Title -->
                <tr>
                    <td style="padding:0 24px;">
                        <h1 style="font-size:22px; font-weight:700;">
                            Your Verification Code:
                            <span th:text="${otp}"></span>
                        </h1>
                        <p style="font-size:14px; color:#606060;">
                            Use this one-time code to continue.
                        </p>
                    </td>
                </tr>

                <!-- OTP Block -->
                <tr>
                    <td align="center" style="padding:12px 24px;">
                        <table cellpadding="0" cellspacing="0" style="margin:8px auto 16px;">
                            <tr>
                                <td align="center"
                                    style="font-size:28px; font-weight:700; letter-spacing:6px;
                                           padding:14px 24px; border:2px dashed #0E2B8B; border-radius:10px;"
                                    th:text="${otp}">
                                </td>
                            </tr>
                        </table>
                        <p style="font-size:13px; color:#606060;">
                            This code expires in <strong>5 minutes</strong>.
                            Don't share it with anyone.
                        </p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding:16px 24px 8px;">
                        <p style="font-size:12px; color:#606060;">
                            Didn't request this? You can safely ignore this email.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:12px 24px 0;">
                        <hr style="border:none; border-top:1px solid #eee;">
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding:16px 24px 22px;">
                        <p style="font-size:12px; color:#606060;">
                            © 2025 Auth System. All rights reserved.
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
